<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Todo Tết</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: #d32f2f;
            color: white;
            text-align: center;
            padding: 20px;
        }

        ul {
            list-style: none;
            padding: 20px;
            margin: 0;
        }

        li {
            background: #f3e5d3;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h2>Chuẩn bị Tết Nguyên Đán</h2>
            <p>Danh sách việc cần làm</p>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script>

        const todos = [
            { id: 1, task: "Mua bánh chưng", done: false },
            { id: 2, task: "Dọn nhà đón Tết", done: false },
            { id: 3, task: "Gói bánh chưng", done: false },
            { id: 4, task: "Trang trí nhà cửa", done: false }
        ];

        let todoList = document.getElementById("todo-list");

        let data = localStorage.getItem("myTodos");

        if (!data) {
            // nếu chưa có thì lưu lần đầu
            localStorage.setItem("myTodos", JSON.stringify(todos));
            data = JSON.stringify(todos);
        }
        let todoData = JSON.parse(data);

        function renderTodos() {
            todoList.innerHTML = "";

            todoData.forEach(todo => {
                todoList.innerHTML += `
            <li>
                <span>${todo.task}</span>
                <span>Chưa làm</span>
            </li>
        `;
            });
        }

        renderTodos();

    </script>

</body>

</html>
