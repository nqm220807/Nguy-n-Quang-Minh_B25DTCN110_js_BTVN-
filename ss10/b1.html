<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const player = {
            name: "Messi",
            position: "Forward",
            age: 36,
            goals: 25,
            assists: 15,
        };

        function showPlayerInfo() {
            console.log(`Tên: ${player.name}`);
            console.log(`Vị trí: ${player.position}`);
            console.log(`Tuổi: ${player.age}`);
            console.log(`Số bàn thắng: ${player.goals}`);
            console.log(`Số kiến tạo: ${player.assists}`);
        }
        showPlayerInfo();
    </script>
</body>
</html>
