<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let students = [];

        const now = () => Date.now();

        const generateId = () =>
            "SV" + Math.random().toString(36).slice(2, 8).toUpperCase();

        const findStudentIndex = (id) =>
            students.findIndex(s => s.id === id);

        function validateStudent({ name, age, gpa, status }) {
            if (!name || name.trim() === "") {
                alert("Tên không hợp lệ");
                return false;
            }

            if (isNaN(age) || age < 16 || age > 60) {
                alert("Tuổi phải từ 16-60");
                return false;
            }

            if (isNaN(gpa) || gpa < 0 || gpa > 10) {
                alert("GPA phải từ 0-10");
                return false;
            }

            if (!["active", "inactive"].includes(status)) {
                alert("Status phải là active/inactive");
                return false;
            }

            return true;
        }

        function createStudent() {
            const name = prompt("Tên:");
            const age = Number(prompt("Tuổi:"));
            const gpa = Number(prompt("GPA:"));
            const status = prompt("Status (active/inactive):");

            if (!validateStudent({ name, age, gpa, status })) return;

            students.push({
                id: generateId(),
                name,
                age,
                gpa,
                status,
                createdAt: now(),
                updatedAt: null,
                deletedAt: null
            });

            alert("Thêm sinh viên thành công!");
        }

        function updateStudent() {
            const id = prompt("Nhập ID cần cập nhật:");
            const index = findStudentIndex(id);

            if (index === -1) return alert("Không tìm thấy!");

            const s = students[index];

            const name = prompt(`Tên (${s.name})`) || s.name;
            const age = prompt(`Tuổi (${s.age})`);
            const gpa = prompt(`GPA (${s.gpa})`);
            const status = prompt(`Status (${s.status})`);

            const updated = {
                ...s,
                name,
                age: age === "" ? s.age : Number(age),
                gpa: gpa === "" ? s.gpa : Number(gpa),
                status: status || s.status,
                updatedAt: now()
            };

            if (!validateStudent(updated)) return;

            students[index] = updated;
            alert("Cập nhật thành công!");
        }

        function softDeleteStudent() {
            const id = prompt("ID cần xoá mềm:");
            const index = findStudentIndex(id);

            if (index === -1) return alert("Không tồn tại!");

            if (!confirm("Bạn chắc chắn muốn xoá?")) return;

            students[index].status = "inactive";
            students[index].deletedAt = now();

            alert("Đã soft delete!");
        }

        function restoreStudent() {
            const id = prompt("ID cần khôi phục:");
            const index = findStudentIndex(id);

            if (index === -1) return alert("Không tồn tại!");

            students[index].status = "active";
            students[index].deletedAt = null;
            students[index].updatedAt = now();

            alert("Khôi phục thành công!");
        }

        function viewStudents() {

            let pipeline = [...students];

            const keyword = prompt("Search tên (Enter bỏ qua):");
            if (keyword) {
                pipeline = pipeline.filter(s =>
                    s.name.toLowerCase().includes(keyword.toLowerCase())
                );
            }

            const statusFilter = prompt("Filter status (active/inactive/all):");
            if (statusFilter && statusFilter !== "all") {
                pipeline = pipeline.filter(s => s.status === statusFilter);
            }

            const sortOrder = prompt("Sort GPA (asc/desc/none):");
            if (sortOrder !== "none") {
                pipeline = [...pipeline].sort((a, b) =>
                    sortOrder === "asc" ? a.gpa - b.gpa : b.gpa - a.gpa
                );
            }

            const pageSize = 5;
            let page = 1;
            const totalPages = Math.ceil(pipeline.length / pageSize);

            while (true) {
                const start = (page - 1) * pageSize;
                const pageData = pipeline.slice(start, start + pageSize);

                console.clear();
                console.table(pageData);
                console.log(
                    `Page ${page}/${totalPages} | Total: ${pipeline.length}`
                );

                const nav = prompt("first / last / next / prev / exit");

                if (nav === "next" && page < totalPages) page++;
                else if (nav === "prev" && page > 1) page--;
                else if (nav === "first") page = 1;
                else if (nav === "last") page = totalPages;
                else if (nav === "exit") break;
            }
        }

        function analyticsDashboard() {

            const overview = students.reduce((acc, s) => {
                acc.total++;
                acc[s.status]++;
                acc.gpaSum += s.gpa;
                return acc;
            }, { total: 0, active: 0, inactive: 0, gpaSum: 0 });

            console.log("===== DASHBOARD =====");
            console.log("Total:", overview.total);
            console.log("Active:", overview.active);
            console.log("Inactive:", overview.inactive);
            console.log(
                "GPA AVG:",
                (overview.gpaSum / (overview.total || 1)).toFixed(2)
            );

            const topGPA = [...students]
                .sort((a, b) => b.gpa - a.gpa)
                .slice(0, 5);

            const youngest = [...students]
                .sort((a, b) => a.age - b.age)
                .slice(0, 5);

            console.log("Top GPA");
            console.table(topGPA);

            console.log("Youngest");
            console.table(youngest);

            const risk = students.reduce((acc, s) => {
                if (s.gpa === 0) acc.zero.push(s);
                if (s.gpa < 3) acc.low.push(s);
                return acc;
            }, { zero: [], low: [] });

            console.log("GPA = 0");
            console.table(risk.zero);

            console.log("GPA < 3");
            console.table(risk.low);
        }

        function menu() {
            return prompt(`
==== STUDENT MANAGER ADVANCED ====
1. Create Student
2. Update Student
3. Soft Delete Student
4. Restore Student
5. View Students
6. Analytics Dashboard
0. Exit
`);
        }

        let choice;

        do {
            choice = menu();

            switch (choice) {
                case "1": createStudent(); break;
                case "2": updateStudent(); break;
                case "3": softDeleteStudent(); break;
                case "4": restoreStudent(); break;
                case "5": viewStudents(); break;
                case "6": analyticsDashboard(); break;
            }

        } while (choice !== "0");
    </script>
</body>

</html>
